<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Sistem Monitoring Stok Gudang</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f4f7fb;
}

.container{
width:400px;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo h1{
color:#1e3a5f;
font-size:24px;
}

.logo p{
color:#777;
font-size:14px;
margin-top:5px;
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#1e3a5f;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#274c77;
}

.footer{
margin-top:20px;
text-align:center;
font-size:13px;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<h1>STOK PANGAN</h1>
<p>Sistem Monitoring Gudang dan Cadangan Pangan Daerah</p>
</div>

<form action="dashboard.html">

<div class="form-group">
<label>Email</label>
<input type="email" placeholder="Masukkan email">
</div>

<div class="form-group">
<label>Password</label>
<input type="password" placeholder="Masukkan password">
</div>

<button type="submit">
Login
</button>

</form>

<div class="footer">
© 2026 Monitoring Stok Gudang
</div>

</div>

</body>
</html>
